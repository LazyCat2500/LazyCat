<!DOCTYPE html>
<html>

<head>
  <title>Mi Música | ImLazyCat</title>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    body {
      background-image: url("diadeplaya.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      margin: 0;
      padding: 50px 20px;
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: 80px;
      color: #ffd84d;

      -webkit-text-stroke: 4px #083c47;

      text-shadow:
        6px 6px 0 #062c33,
        0 0 30px rgba(255, 200, 0, 0.6);

      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 24px;
      margin-bottom: 40px;
    }

    .songs-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin-top: 30px;
    }

    .song-card {
      width: 300px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(5px);

      transition: transform 0.3s;
    }

    .song-card:hover {
      transform: translateY(-5px);
    }

    .cover {
      width: 100%;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .cover:hover {
      transform: scale(1.03);
    }

    .song-title {
      margin-top: 15px;
      font-size: 24px;
      font-weight: bold;
    }

    .listen-btn {
      display: inline-block;
      margin-top: 12px;

      background: #ffb300;
      color: white;

      padding: 10px 20px;
      border-radius: 10px;

      text-decoration: none;
      font-weight: bold;

      transition: 0.3s;
    }

    .listen-btn:hover {
      background: #ffd84d;
      color: black;
    }

    .back-btn {
      display: inline-block;
      margin-top: 50px;

      background: #ffd84d;
      color: black;

      padding: 12px 24px;
      border-radius: 15px;

      text-decoration: none;
      font-weight: bold;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }
  </style>

</head>

<body>

  <h1>🎵 Mi Música</h1>

  <p class="subtitle">
    Escucha mis canciones y proyectos musicales
  </p>

  <div class="songs-grid">

    <!-- CANCIÓN 1 -->
    <div class="song-card">
      <a href="https://youtu.be/P-LsrDZcHJY?si=50EkL4zROXx6403a" target="_blank">
        <img src="diadeplaya.png" alt="Día de Playa" class="cover">
      </a>

      <div class="song-title">Día de Playa</div>

      <a href="https://youtu.be/P-LsrDZcHJY?si=50EkL4zROXx6403a" target="_blank" class="listen-btn">
        ▶ Escuchar
      </a>
    </div>

    <!-- CANCIÓN 2 -->
    <div class="song-card">
      <a href="#" target="_blank">
        <img src="cancion-2.jpg" alt="Canción 2" class="cover">
      </a>

      <div class="song-title">Canción 2</div>

      <a href="#" target="_blank" class="listen-btn">
        ▶ Escuchar
      </a>
    </div>

    <!-- CANCIÓN 3 -->
    <div class="song-card">
      <a href="#" target="_blank">
        <img src="cancion-3.jpg" alt="Canción 3" class="cover">
      </a>

      <div class="song-title">Canción 3</div>

      <a href="#" target="_blank" class="listen-btn">
        ▶ Escuchar
      </a>
    </div>

  </div>

  <a href="index.html" class="back-btn">
    ⬅ Volver al inicio
  </a>

</body>

</html>
