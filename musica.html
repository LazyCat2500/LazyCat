<!DOCTYPE html>
<html>

<head>
  <title>Mi Música | ImLazyCat</title>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    body {
      background-image: url("diadeplaya.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      margin: 0;
      padding: 50px 20px;
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: 80px;
      color: #ffd84d;

      -webkit-text-stroke: 4px #083c47;

      text-shadow:
        6px 6px 0 #062c33,
        0 0 30px rgba(255, 200, 0, 0.6);

      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 24px;
      margin-bottom: 40px;
    }

    .music-links {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .music-btn {
      background: #ffb300;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 22px;
      font-weight: bold;
      transition: 0.3s;
    }

    .music-btn:hover {
      background: #ffd84d;
      color: black;
      transform: scale(1.05);
    }

    .song-card {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;

      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .song-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 40px;
      text-decoration: none;

      background: #ffd84d;
      color: black;

      padding: 12px 24px;
      border-radius: 15px;

      font-weight: bold;
      transition: 0.3s;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>🎵 Mi Música</h1>

  <p class="subtitle">
    Escucha mis canciones y proyectos musicales
  </p>

  <div class="music-links">
    <a href="https://youtube.com/@imlazycat25" target="_blank" class="music-btn">
      ▶ YouTube
    </a>

    <a href="https://soundcloud.com/Elquemaco" target="_blank" class="music-btn">
      ☁ SoundCloud
    </a>
  </div>

  <div class="song-card">
    <div class="song-title">🎵 El Último Turno</div>
    <p>Una de mis canciones inspiradas en Five Nights at Candy's.</p>
  </div>

  <div class="song-card">
    <div class="song-title">🎵 Próximamente...</div>
    <p>Más música llegará pronto.</p>
  </div>

  <a href="index.html" class="back-btn">
    ⬅ Volver al inicio
  </a>

</body>
</html>
